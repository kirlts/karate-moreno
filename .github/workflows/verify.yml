name: Verify Code

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci
      working-directory: frontend

    - name: Run lint
      run: npm run lint
      working-directory: frontend

    - name: Run tests
      run: npm test -- --run
      working-directory: frontend

    - name: Build
      run: npm run build
      working-directory: frontend
